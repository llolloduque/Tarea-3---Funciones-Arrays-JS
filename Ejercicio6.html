<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ejercicio 6</title>
</head>
<body>
<h1>Ejercicio 6</h1>
<pre id="output"></pre>

<script>
const nombres = ["ana garcia","luis perez","marta lopez","carlos ruiz"];

const formateados = nombres.map(n => {
  const [nombre, apellido] = n.split(" ");
  return `${apellido.toUpperCase()}, ${nombre.charAt(0).toUpperCase() + nombre.slice(1)}`;
});

document.getElementById("output").textContent = JSON.stringify(formateados, null, 2);
</script>

</body>
</html>
