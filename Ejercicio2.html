<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ejercicio 2</title>
</head>
<body>
<h1>Ejercicio 2</h1>
<pre id="output"></pre>

<script>
const productos = [
{ nombre:"Manzana", precio:1.2, stock:50 },
{ nombre:"Kiwi", precio:0.8, stock:0 },
{ nombre:"Mango", precio:2.5, stock:12 },
{ nombre:"Papaya", precio:3.0, stock:0 },
{ nombre:"Naranja", precio:0.6, stock:30 }
];

const disponibles = productos.filter(p => p.stock > 0);
document.getElementById("output").textContent = JSON.stringify(disponibles, null, 2);
</script>

</body>
</html>
