<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ejercicio 14</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<h1>Ejercicio 14</h1>
<pre id="output"></pre>

<script>
const carrito = [
{ nombre:"Teclado", precio:45.99 },
{ nombre:"Ratón", precio:19.5 },
{ nombre:"Monitor", precio:199.0 },
{ nombre:"Webcam", precio:34.99 }
];

let total = 0;
let texto = "";

carrito.forEach(p => {
  texto += `${p.nombre}: ${p.precio.toFixed(2)} €\n`;
  total += p.precio;
});

texto += "\nTotal: " + total.toFixed(2) + " €";

document.getElementById("output").textContent = texto;
</script>

</body>
</html>
