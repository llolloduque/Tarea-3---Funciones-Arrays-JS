<!DOCTYPE html>
<html lang="es">
<head>

<title>Ejercicio 9</title>

<body>
<h1>Ejercicio 9</h1>
<pre id="output"></pre>

<script>
const palabras = ["hola","mundo","hola","js","mundo","hola","filter","js","hola"];

const conteo = palabras.reduce((acc,p) => {
  acc[p] = (acc[p] || 0) + 1;
  return acc;
}, {});

document.getElementById("output").textContent = JSON.stringify(conteo, null, 2);
</script>
