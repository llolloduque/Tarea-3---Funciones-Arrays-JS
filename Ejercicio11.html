<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ejercicio 11</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<h1>Ejercicio 11</h1>
<pre id="output"></pre>

<script>
const productos = [
{ nombre:"Manzana", precio:1.2 },
{ nombre:"Kiwi", precio:0.8 },
{ nombre:"Mango", precio:2.5 }
];

const idx = productos.findIndex(p => p.nombre === "Kiwi");

if(idx !== -1){
  productos[idx].precio = 1.5;
}

document.getElementById("output").textContent = JSON.stringify(productos, null, 2);
</script>

</body>
</html>
